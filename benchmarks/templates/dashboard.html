<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pare Benchmarks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9fafb;
  --surface: #ffffff;
  --border: #e5e7eb;
  --border-light: #f3f4f6;
  --text: #111827;
  --secondary: #6b7280;
  --muted: #9ca3af;
  --faint: #d1d5db;
  --green: #10b981;
  --green-bg: #ecfdf5;
  --green-border: #a7f3d0;
  --amber: #f59e0b;
  --amber-bg: #fffbeb;
  --amber-border: #fde68a;
  --red: #ef4444;
  --red-bg: #fef2f2;
  --red-border: #fecaca;
  --blue: #3b82f6;
  --blue-bg: #eff6ff;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'Geist Mono', 'SF Mono', 'Menlo', monospace;
  --radius: 10px;
  --radius-sm: 6px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ────────────────────────────────── */
.app { display: flex; flex-direction: column; height: 100vh; }

.topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  height: 52px;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 16px;
}

.main-row { flex: 1; display: flex; overflow: hidden; }

.content-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.history-col {
  width: 260px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ────────────────────────────────── */
.tb-left { display: flex; align-items: baseline; gap: 8px; }
.tb-title { font-size: 15px; font-weight: 700; color: var(--text); }
.tb-sub { font-size: 13px; color: var(--muted); font-weight: 400; }

.tb-center { display: flex; align-items: center; gap: 8px; margin-left: auto; position: relative; }

.btn {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  padding: 7px 18px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 100ms ease;
  border: none;
}
.btn-primary { background: var(--text); color: #fff; }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--secondary); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg); color: var(--text); }

/* Config dropdown */
.config-wrap { position: relative; }
.config-drop {
  display: none; position: absolute; top: calc(100% + 8px); right: 0;
  width: 300px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; z-index: 50;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.config-drop.open { display: block; }

.cfg-group { margin-bottom: 14px; }
.cfg-group:last-child { margin-bottom: 0; }
.cfg-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }

.chip-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--surface); color: var(--secondary); font-family: var(--mono);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 100ms;
}
.chip:hover { border-color: var(--secondary); }
.chip.active { background: var(--text); color: #fff; border-color: var(--text); }
.chip.unavailable { opacity: 0.25; cursor: not-allowed; }

.preset-btns { display: flex; gap: 4px; }
.preset-btn {
  flex: 1; padding: 6px 0; border: 1px solid var(--border); border-radius: 4px;
  background: var(--surface); color: var(--secondary); font-family: var(--sans);
  font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all 100ms;
}
.preset-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

.cfg-select {
  width: 100%; padding: 6px 8px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: var(--sans); font-size: 13px;
}

.cfg-run-btn {
  width: 100%; margin-top: 10px; padding: 8px 0; background: var(--text); border: none;
  border-radius: var(--radius-sm); color: #fff; font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer;
}
.cfg-run-btn:hover { opacity: 0.85; }

/* ── TAB BAR ───────────────────────────────── */
.tab-bar {
  flex-shrink: 0; display: flex; align-items: stretch;
  height: 40px; padding: 0 20px;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.tab {
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  padding: 0 16px; background: transparent; border: none;
  border-bottom: 2px solid transparent; color: var(--muted);
  cursor: pointer; transition: all 100ms;
}
.tab:hover { color: var(--secondary); }
.tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }

/* ── CONTENT ───────────────────────────────── */
.content-body { flex: 1; overflow-y: auto; background: var(--bg); }
.content-scroll { padding: 20px 24px 40px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* ── PROGRESS ──────────────────────────────── */
.progress { height: 2px; background: var(--border-light); display: none; }
.progress.visible { display: block; }
.progress-fill { height: 100%; background: var(--blue); transition: width 300ms ease; width: 0%; }

/* ── SECTION HEADERS ───────────────────────── */
.sec-title {
  font-size: 13px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.04em;
  margin-bottom: 12px;
}

/* ── WELCOME ───────────────────────────────── */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 40vh; text-align: center;
}
.welcome-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.welcome-desc { font-size: 14px; color: var(--muted); max-width: 360px; line-height: 1.6; }

/* ── SUMMARY STRIP ─────────────────────────── */
.summary-strip {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.summary-card {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  min-width: 0;
}
.summary-card.running {
  border-color: var(--blue);
  background: var(--blue-bg);
}
.sc-label {
  font-size: 12px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px;
}
.sc-value {
  font-family: var(--mono); font-size: 24px; font-weight: 600; color: var(--text);
}
.sc-value.good { color: var(--green); }
.sc-value.warn { color: var(--amber); }
.sc-value.bad { color: var(--red); }

/* ── FORMAT CARDS (Overview) ───────────────── */
.fmt-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
}
.fmt-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  transition: box-shadow 150ms ease;
}
.fmt-card:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.04); }
.fmt-card.health-pass { border-left: 3px solid var(--green); }
.fmt-card.health-warn { border-left: 3px solid var(--amber); }
.fmt-card.health-fail { border-left: 3px solid var(--red); }

.fc-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.fc-name {
  font-family: var(--mono); font-size: 15px; font-weight: 700;
  text-transform: uppercase; color: var(--text);
}
.fc-badge {
  font-size: 12px; font-weight: 600; padding: 3px 10px;
  border-radius: 10px;
}
.fc-badge.pass { color: var(--green); background: var(--green-bg); }
.fc-badge.warn { color: var(--amber); background: var(--amber-bg); }
.fc-badge.fail { color: var(--red); background: var(--red-bg); }

.fc-big-num {
  font-family: var(--mono); font-size: 28px; font-weight: 700;
  color: var(--text); line-height: 1;
}
.fc-big-label {
  font-size: 13px; color: var(--muted); margin-top: 2px; margin-bottom: 14px;
}

/* Preset mini bars inside cards */
.fc-presets { display: flex; flex-direction: column; gap: 7px; }
.fc-preset-row {
  display: flex; align-items: center; gap: 8px;
}
.fc-preset-label {
  width: 56px; font-size: 12px; font-weight: 600; color: var(--muted);
  font-family: var(--mono); flex-shrink: 0;
}
.fc-preset-bar-wrap {
  flex: 1; height: 10px; background: var(--border-light);
  border-radius: 5px; overflow: hidden;
}
.fc-preset-bar {
  height: 100%; border-radius: 5px; transition: width 400ms ease;
  min-width: 4px;
}
.fc-preset-bar.high { background: #3b82f6; }
.fc-preset-bar.medium { background: #8b5cf6; }
.fc-preset-bar.low { background: #f59e0b; }
.fc-preset-pct {
  width: 50px; text-align: right; font-family: var(--mono);
  font-size: 13px; font-weight: 600; color: var(--text); flex-shrink: 0;
}

.fc-footer {
  display: flex; justify-content: space-between;
  margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--border-light);
  font-size: 13px; color: var(--muted);
}
.fc-foot-val { font-family: var(--mono); font-weight: 600; color: var(--text); }

/* ── TABLES ────────────────────────────────── */
.dt { width: 100%; border-collapse: collapse; font-size: 14px; }
.dt th {
  font-family: var(--sans); font-weight: 600; font-size: 11px;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em;
  text-align: right; padding: 0 12px 10px 0; border-bottom: 1px solid var(--border);
}
.dt th:first-child { text-align: left; }
.dt td {
  font-family: var(--mono); text-align: right;
  padding: 9px 12px 9px 0; color: var(--text); font-size: 14px;
  border-bottom: 1px solid var(--border-light);
}
.dt td:first-child { text-align: left; font-family: var(--sans); font-weight: 600; }
.dt tbody tr:last-child td { border-bottom: none; }
.dt tbody tr:hover td { background: rgba(0,0,0,0.015); }

.c-pass { color: var(--green); font-weight: 600; }
.c-warn { color: var(--amber); font-weight: 600; }
.c-fail { color: var(--red); font-weight: 600; }

.dpill {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 4px;
  font-size: 12px; font-weight: 600; font-family: var(--sans);
}
.dpill.pass { color: var(--green); background: var(--green-bg); }
.dpill.warn { color: var(--amber); background: var(--amber-bg); }
.dpill.fail { color: var(--red); background: var(--red-bg); }
.dpill.neutral { color: var(--muted); background: var(--border-light); }

/* ── GRIDS (Estimation/Methods/Speed) ──────── */
.grid-cols {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap: 16px;
}
.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px 32px;
  align-items: start;
}

/* ── PANEL (card wrapper for tab content) ──── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.panel-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  text-transform: uppercase; letter-spacing: 0.03em;
  margin-bottom: 14px;
}

/* ── ESTIMATION ROWS ──────────────────────── */
.eg-head {
  font-size: 13px; font-weight: 700; color: var(--secondary);
  margin-top: 18px; margin-bottom: 4px;
  padding: 6px 6px 6px 0;
  border-bottom: 1px solid var(--border);
}
.eg-head:first-child { margin-top: 0; }

/* Column header row inside estimation panels */
.e-col-header {
  display: flex; align-items: center; gap: 6px;
  padding: 0 6px 8px;
  font-size: 11px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
}
.e-col-header .e-name { color: var(--muted); }
.e-col-header .e-val-col { color: var(--muted); }

.e-row {
  display: flex; align-items: center; gap: 6px;
  min-height: 34px; font-size: 14px; padding: 4px 6px;
}
.e-row:hover { background: var(--border-light); border-radius: 4px; }
.e-name {
  flex: 1; min-width: 0; color: var(--text); font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-size: 14px;
}
.e-val-col {
  width: 84px; text-align: right; flex-shrink: 0;
  font-family: var(--mono); font-size: 14px; font-weight: 500;
  color: var(--text);
}
.e-val-col.est-col { color: var(--secondary); }
.e-val-col.act-col { color: var(--text); font-weight: 600; }
.e-val-col.delta-col { font-weight: 700; }
.e-val-col.delta-col.good { color: var(--green); }
.e-val-col.delta-col.ok { color: var(--amber); }
.e-val-col.delta-col.bad { color: var(--red); }
.e-val-col.error-text { color: var(--muted); font-style: italic; font-family: var(--sans); }

/* ── METHOD ROWS ──────────────────────────── */
.mg-head {
  font-size: 13px; font-weight: 700; color: var(--text);
  text-transform: uppercase; margin-top: 18px; margin-bottom: 6px;
  padding-bottom: 4px; border-bottom: 1px solid var(--border-light);
}
.mg-head:first-child { margin-top: 0; }

.m-row {
  display: flex; align-items: center; gap: 8px;
  height: 32px; font-size: 14px; padding: 0 6px;
}
.m-row:hover { background: var(--border-light); border-radius: 4px; }
.m-preset { width: 40px; color: var(--muted); flex-shrink: 0; font-weight: 600; font-size: 12px; }
.m-method {
  flex: 1; min-width: 0; font-family: var(--mono); font-weight: 500; color: var(--text);
  font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.m-stat {
  font-family: var(--mono); font-size: 13px; color: var(--muted); flex-shrink: 0;
}

/* ── HISTORY ───────────────────────────────── */
.hist-header {
  padding: 14px 16px; font-size: 12px; font-weight: 700;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.05em; border-bottom: 1px solid var(--border);
}
.hist-body { flex: 1; overflow-y: auto; }

.hist-item {
  padding: 10px 16px; cursor: pointer;
  border-bottom: 1px solid var(--border-light); transition: background 80ms;
}
.hist-item:hover { background: var(--bg); }
.hist-item.active { background: var(--blue-bg); border-left: 2px solid var(--blue); padding-left: 14px; }

.hist-date { font-size: 13px; font-weight: 600; color: var(--text); }
.hist-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.hist-dots { display: flex; gap: 4px; margin-top: 5px; }
.hist-dot { width: 7px; height: 7px; border-radius: 50%; }
.hist-dot.pass { background: var(--green); }
.hist-dot.warn { background: var(--amber); }
.hist-dot.fail { background: var(--red); }
.hist-delete { font-family: var(--sans); font-size: 11px; color: var(--faint); background: none; border: none; cursor: pointer; margin-top: 3px; }
.hist-delete:hover { color: var(--red); }
.hist-empty { padding: 20px 16px; color: var(--muted); font-size: 13px; }

/* ── SCROLLBAR ─────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="tb-left">
      <span class="tb-title">Pare</span>
      <span class="tb-sub">Benchmarks</span>
    </div>
    <div class="tb-center">
      <button class="btn btn-primary" id="btn-run" onclick="runAll()">Run benchmark</button>
      <div class="config-wrap">
        <button class="btn btn-ghost" id="btn-config" onclick="toggleConfig()">Config</button>
        <div class="config-drop" id="config-drop">
          <div class="cfg-group">
            <div class="cfg-label">Formats</div>
            <div class="chip-grid" id="format-chips"></div>
          </div>
          <div class="cfg-group">
            <div class="cfg-label">Presets</div>
            <div class="preset-btns">
              <button class="preset-btn active" data-preset="HIGH" onclick="togglePreset(this)">HIGH</button>
              <button class="preset-btn active" data-preset="MEDIUM" onclick="togglePreset(this)">MED</button>
              <button class="preset-btn active" data-preset="LOW" onclick="togglePreset(this)">LOW</button>
            </div>
          </div>
          <div class="cfg-group">
            <div class="cfg-label">Images per format</div>
            <select class="cfg-select" id="images-per-format">
              <option value="1">1</option>
              <option value="3" selected>3</option>
              <option value="5">5</option>
            </select>
          </div>
          <button class="cfg-run-btn" onclick="runConfigured()">Run with config</button>
        </div>
      </div>
    </div>
  </div>

  <div class="main-row">
    <div class="content-col">
      <div class="tab-bar">
        <button class="tab active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
        <button class="tab" data-tab="estimation" onclick="switchTab('estimation')">Estimation</button>
        <button class="tab" data-tab="methods" onclick="switchTab('methods')">Methods</button>
        <button class="tab" data-tab="speed" onclick="switchTab('speed')">Speed</button>
      </div>
      <div class="progress" id="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="content-body">
        <div class="content-scroll">
          <div class="tab-pane active" id="pane-overview"><div id="overview-out">
            <div class="welcome"><div class="welcome-title">No benchmark data yet</div><div class="welcome-desc">Click "Run benchmark" to test how your presets perform across formats.</div></div>
          </div></div>
          <div class="tab-pane" id="pane-estimation"><div id="estimation-out"><div class="welcome"><div class="welcome-desc">Run a benchmark first.</div></div></div></div>
          <div class="tab-pane" id="pane-methods"><div id="methods-out"><div class="welcome"><div class="welcome-desc">Run a benchmark first.</div></div></div></div>
          <div class="tab-pane" id="pane-speed"><div id="speed-out"><div class="welcome"><div class="welcome-desc">Run a benchmark first.</div></div></div></div>
        </div>
      </div>
    </div>

    <aside class="history-col">
      <div class="hist-header">Runs</div>
      <div class="hist-body" id="history-list"><div class="hist-empty">No runs yet.</div></div>
    </aside>
  </div>
</div>

<script>
let corpusFormats = {}, currentResults = [], isRunning = false, activeTab = 'overview',
    healthStatus = {}, runMeta = null, progressDone = 0, progressTotal = 0;

async function init() { await loadCorpus(); await loadHistory(); }

async function loadCorpus() {
  try {
    const r = await fetch('/api/corpus');
    const d = await r.json();
    corpusFormats = d.formats;
    renderFormatChips();
  } catch(e) { console.error('Corpus load failed:', e); }
}

function renderFormatChips() {
  const c = document.getElementById('format-chips');
  const all = ['jpeg','png','webp','gif','bmp','tiff','avif','heic','jxl','svg','svgz'];
  c.innerHTML = all.map(f => {
    const ok = corpusFormats[f] && corpusFormats[f].total > 0;
    return `<button class="chip ${ok?'active':'unavailable'}" data-format="${f}" ${ok?'onclick="toggleChip(this)"':''} title="${ok?corpusFormats[f].total+' images':'unavailable'}">${f}</button>`;
  }).join('');
}

function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + id));
}

function toggleConfig() { document.getElementById('config-drop').classList.toggle('open'); }
function toggleChip(el) { el.classList.toggle('active'); }
function togglePreset(el) { el.classList.toggle('active'); }
function getSelectedFormats() { return [...document.querySelectorAll('#format-chips .chip.active')].map(c => c.dataset.format); }
function getSelectedPresets() { return [...document.querySelectorAll('.preset-btn.active')].map(p => p.dataset.preset); }

async function runAll() {
  await startRun({ formats: [], presets: ['HIGH','MEDIUM','LOW'], images_per_format: 3 });
}

async function runConfigured() {
  document.getElementById('config-drop').classList.remove('open');
  await startRun({
    formats: getSelectedFormats(),
    presets: getSelectedPresets(),
    images_per_format: parseInt(document.getElementById('images-per-format').value)
  });
}

async function startRun(config) {
  if (isRunning) return;
  isRunning = true; runMeta = null; healthStatus = {}; currentResults = [];
  progressDone = 0; progressTotal = 0;
  document.getElementById('btn-run').disabled = true;
  showProgress(0);
  renderAllTabs();

  try {
    const resp = await fetch('/api/run', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config)
    });
    const run = await resp.json();
    if (!resp.ok) {
      hideProgress(); isRunning = false;
      document.getElementById('btn-run').disabled = false;
      return;
    }
    progressTotal = run.total_tasks;

    const es = new EventSource(`/api/run/${run.run_id}/stream`);
    es.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'start') {
        progressTotal = msg.total;
        showProgress(0);
      } else if (msg.type === 'result') {
        currentResults.push(msg.result);
        progressDone = msg.done;
        showProgress(msg.progress);
        renderAllTabs();
      } else if (msg.type === 'complete') {
        healthStatus = msg.health || {};
        runMeta = {
          duration_s: msg.duration_s,
          health: msg.health,
          total: currentResults.length,
          errors: currentResults.filter(r => r.opt_error).length
        };
        isRunning = false;
        document.getElementById('btn-run').disabled = false;
        showProgress(100);
        setTimeout(hideProgress, 1500);
        renderAllTabs();
        loadHistory();
        es.close();
      }
    };
    es.onerror = () => {
      es.close(); isRunning = false;
      document.getElementById('btn-run').disabled = false;
      hideProgress();
    };
  } catch(e) {
    isRunning = false;
    document.getElementById('btn-run').disabled = false;
    hideProgress();
  }
}

function showProgress(pct) {
  document.getElementById('progress-track').classList.add('visible');
  document.getElementById('progress-fill').style.width = pct + '%';
}
function hideProgress() {
  document.getElementById('progress-track').classList.remove('visible');
}
function renderAllTabs() {
  renderOverview();
  renderEstimation();
  renderMethods();
  renderSpeed();
}

/* ── Helpers ───────────────────────────────── */
function groupByFormat(r) {
  const m = {};
  for (const x of r) { m[x.format] = m[x.format] || []; m[x.format].push(x); }
  return m;
}

function errCls(p) { return p <= 5 ? 'good' : p <= 15 ? 'ok' : 'bad'; }
function errColor(p) { return p <= 5 ? 'c-pass' : p <= 15 ? 'c-warn' : 'c-fail'; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function trunc(s, n) { return s.length > n ? s.slice(0, n-1) + '\u2026' : s; }

function diffPill(a) {
  const h = a.HIGH, m = a.MEDIUM, l = a.LOW;
  if (h == null || m == null || l == null) return '<span class="dpill neutral">\u2014</span>';
  if (h > m && m > l) return (h-l) > 5 ? '<span class="dpill pass">\u2713 yes</span>' : '<span class="dpill warn">narrow</span>';
  return '<span class="dpill fail">\u2717 no</span>';
}
function estPill(e) {
  return e < 10 ? '<span class="dpill pass">accurate</span>' : e < 15 ? '<span class="dpill warn">ok</span>' : '<span class="dpill fail">poor</span>';
}

/* ── OVERVIEW ──────────────────────────────── */
function renderOverview() {
  const el = document.getElementById('overview-out');
  if (!currentResults.length && !isRunning) {
    el.innerHTML = '<div class="welcome"><div class="welcome-title">No benchmark data yet</div><div class="welcome-desc">Click "Run benchmark" to test how your presets perform across formats.</div></div>';
    return;
  }

  const byFmt = groupByFormat(currentResults);
  const fmts = Object.entries(byFmt).sort();
  let h = '';

  // Summary strip
  if (isRunning) {
    h += `<div class="summary-strip">
      <div class="summary-card running">
        <div class="sc-label">Progress</div>
        <div class="sc-value">${progressDone}<span style="font-size:16px;color:var(--muted)">/${progressTotal}</span></div>
      </div>
    </div>`;
  } else if (runMeta) {
    const hObj = runMeta.health || {};
    const total = Object.keys(hObj).length;
    const passing = Object.values(hObj).filter(v => v === 'pass').length;
    const warnings = Object.values(hObj).filter(v => v === 'warn').length;
    const failing = Object.values(hObj).filter(v => v === 'fail').length;

    const allResults = currentResults.filter(r => !r.opt_error);
    const avgReduction = allResults.length ? allResults.reduce((s,r) => s + r.reduction_pct, 0) / allResults.length : 0;
    const validEst = currentResults.filter(r => !r.opt_error && !r.est_error);
    const avgEstErr = validEst.length ? validEst.reduce((s,r) => s + r.est_error_pct, 0) / validEst.length : 0;

    h += `<div class="summary-strip">
      <div class="summary-card"><div class="sc-label">Formats passing</div><div class="sc-value ${passing===total?'good':failing>0?'bad':'warn'}">${passing}/${total}</div></div>
      <div class="summary-card"><div class="sc-label">Avg reduction</div><div class="sc-value">${avgReduction.toFixed(1)}%</div></div>
      <div class="summary-card"><div class="sc-label">Avg est. error</div><div class="sc-value ${avgEstErr<10?'good':avgEstErr<15?'warn':'bad'}">${avgEstErr.toFixed(1)}%</div></div>
      <div class="summary-card"><div class="sc-label">Duration</div><div class="sc-value">${runMeta.duration_s}s</div></div>
    </div>`;
  }

  // Build card data for each format
  const cardData = fmts.map(([fmt, results]) => {
    const valid = results.filter(r => !r.opt_error);
    const avg = valid.length ? valid.reduce((s,r) => s + r.reduction_pct, 0) / valid.length : 0;
    const st = healthStatus[fmt] || '';

    const bp = {};
    for (const r of results) {
      if (!r.opt_error) { bp[r.preset] = bp[r.preset] || []; bp[r.preset].push(r.reduction_pct); }
    }
    const presetAvg = {};
    for (const [p, v] of Object.entries(bp)) { presetAvg[p] = v.reduce((x,y) => x+y, 0) / v.length; }

    const validEst = results.filter(r => !r.opt_error && !r.est_error);
    const estErr = validEst.length ? validEst.reduce((s,r) => s + r.est_error_pct, 0) / validEst.length : null;

    const diffOk = presetAvg.HIGH != null && presetAvg.MEDIUM != null && presetAvg.LOW != null
      && presetAvg.HIGH > presetAvg.MEDIUM && presetAvg.MEDIUM > presetAvg.LOW;

    return { fmt, results, valid, avg, st, presetAvg, estErr, diffOk };
  });

  // Split into passing and non-passing
  const passing = cardData.filter(c => c.st === 'pass');
  const attention = cardData.filter(c => c.st !== 'pass');

  function renderCardGroup(cards) {
    let out = '<div class="fmt-grid">';
    for (const c of cards) {
      // Scale bars within this card's own max for clear differentiation
      const localMax = Math.max(...Object.values(c.presetAvg), 1);

      out += `<div class="fmt-card health-${c.st}">
        <div class="fc-header">
          <span class="fc-name">${c.fmt}</span>
          ${c.st ? `<span class="fc-badge ${c.st}">${c.st}</span>` : ''}
        </div>
        <div class="fc-big-num">${c.avg.toFixed(1)}%</div>
        <div class="fc-big-label">avg reduction across ${c.valid.length} cases</div>
        <div class="fc-presets">`;

      for (const preset of ['HIGH', 'MEDIUM', 'LOW']) {
        const pAvg = c.presetAvg[preset];
        if (pAvg == null) continue;
        const barW = Math.max((pAvg / localMax) * 100, 3);
        const tierCls = preset === 'HIGH' ? 'high' : preset === 'MEDIUM' ? 'medium' : 'low';
        out += `<div class="fc-preset-row">
          <span class="fc-preset-label">${preset}</span>
          <span class="fc-preset-bar-wrap"><span class="fc-preset-bar ${tierCls}" style="width:${barW}%"></span></span>
          <span class="fc-preset-pct">${pAvg.toFixed(1)}%</span>
        </div>`;
      }

      out += `</div>
        <div class="fc-footer">
          <span>Est. error: <span class="fc-foot-val">${c.estErr != null ? c.estErr.toFixed(1) + '%' : '\u2014'}</span></span>
          <span>Diff: ${c.diffOk ? '<span class="fc-foot-val" style="color:var(--green)">\u2713</span>' : '<span class="fc-foot-val" style="color:var(--red)">\u2717</span>'}</span>
        </div>
      </div>`;
    }
    out += '</div>';
    return out;
  }

  // Render passing formats
  if (passing.length) {
    h += `<div class="sec-title" style="color:var(--green)">Passing (${passing.length})</div>`;
    h += renderCardGroup(passing);
  }

  // Render attention-needed formats
  if (attention.length) {
    h += `<div class="sec-title" style="margin-top:24px;color:var(--amber)">Needs attention (${attention.length})</div>`;
    h += renderCardGroup(attention);
  }

  el.innerHTML = h;
}

/* ── ESTIMATION ────────────────────────────── */
function renderEstimation() {
  const el = document.getElementById('estimation-out');
  if (!currentResults.length) {
    el.innerHTML = '<div class="welcome"><div class="welcome-desc">Run a benchmark first.</div></div>';
    return;
  }

  const byFmt = groupByFormat(currentResults);
  let h = '';

  // Per-format panels with column headers
  h += '<div class="grid-cols">';
  for (const [fmt, results] of Object.entries(byFmt).sort()) {
    h += `<div class="panel"><div class="panel-title">${fmt}</div>`;

    // Column headers
    h += `<div class="e-col-header">
      <span class="e-name">Image</span>
      <span class="e-val-col">Estimated</span>
      <span class="e-val-col">Actual</span>
      <span class="e-val-col">Delta</span>
    </div>`;

    const bp = {};
    for (const r of results) { bp[r.preset] = bp[r.preset] || []; bp[r.preset].push(r); }

    for (const preset of ['HIGH', 'MEDIUM', 'LOW']) {
      if (!bp[preset]) continue;
      h += `<div class="eg-head">${preset}</div>`;
      for (const r of bp[preset]) {
        if (r.opt_error) {
          h += `<div class="e-row"><span class="e-name">${esc(trunc(r.name, 28))}</span><span class="e-val-col error-text" style="width:240px">error</span></div>`;
          continue;
        }
        const d = r.est_reduction_pct - r.reduction_pct;
        const sign = d >= 0 ? '+' : '';
        h += `<div class="e-row">
          <span class="e-name">${esc(trunc(r.name, 28))}</span>
          <span class="e-val-col est-col">${r.est_reduction_pct.toFixed(1)}%</span>
          <span class="e-val-col act-col">${r.reduction_pct.toFixed(1)}%</span>
          <span class="e-val-col delta-col ${errCls(r.est_error_pct)}">${sign}${d.toFixed(1)}%</span>
        </div>`;
      }
    }
    h += '</div>';
  }
  h += '</div>';

  // Worst outliers
  const valid = currentResults.filter(r => !r.opt_error && !r.est_error);
  if (valid.length) {
    const sorted = [...valid].sort((a, b) => b.est_error_pct - a.est_error_pct).slice(0, 8);
    h += '<div class="panel" style="margin-top:16px"><div class="panel-title">Worst outliers</div>';
    h += '<table class="dt"><thead><tr><th>Image</th><th>Format</th><th>Preset</th><th>Est.</th><th>Actual</th><th>Error</th></tr></thead><tbody>';
    for (const r of sorted) {
      h += `<tr>
        <td>${esc(trunc(r.name, 20))}</td>
        <td>${r.format}</td>
        <td>${r.preset}</td>
        <td>${r.est_reduction_pct.toFixed(1)}%</td>
        <td>${r.reduction_pct.toFixed(1)}%</td>
        <td class="${errColor(r.est_error_pct)}">${r.est_error_pct.toFixed(1)}%</td>
      </tr>`;
    }
    h += '</tbody></table></div>';
  }

  el.innerHTML = h;
}

/* ── METHODS ───────────────────────────────── */
function renderMethods() {
  const el = document.getElementById('methods-out');
  if (!currentResults.length) {
    el.innerHTML = '<div class="welcome"><div class="welcome-desc">Run a benchmark first.</div></div>';
    return;
  }

  const byFmt = groupByFormat(currentResults);
  let h = '<div class="grid-cols">';
  for (const [fmt, results] of Object.entries(byFmt).sort()) {
    h += `<div class="panel"><div class="panel-title">${fmt}</div>`;
    const bp = {};
    for (const r of results) { bp[r.preset] = bp[r.preset] || []; bp[r.preset].push(r); }

    for (const preset of ['HIGH', 'MEDIUM', 'LOW']) {
      if (!bp[preset]) continue;
      const bm = {};
      for (const r of bp[preset]) {
        const m = r.opt_error ? 'error' : (r.method || 'none');
        bm[m] = bm[m] || [];
        bm[m].push(r);
      }
      for (const [method, mrs] of Object.entries(bm)) {
        const v = mrs.filter(r => !r.opt_error);
        const avg = v.length ? v.reduce((s,r) => s + r.reduction_pct, 0) / v.length : 0;
        h += `<div class="m-row">
          <span class="m-preset">${preset.slice(0,3)}</span>
          <span class="m-method">${esc(method)}</span>
          <span class="m-stat">${mrs.length}x</span>
          <span class="m-stat">${v.length ? avg.toFixed(1) + '%' : ''}</span>
        </div>`;
      }
    }
    h += '</div>';
  }
  h += '</div>';
  el.innerHTML = h;
}

/* ── SPEED ─────────────────────────────────── */
function renderSpeed() {
  const el = document.getElementById('speed-out');
  if (!currentResults.length) {
    el.innerHTML = '<div class="welcome"><div class="welcome-desc">Run a benchmark first.</div></div>';
    return;
  }

  const byFmt = groupByFormat(currentResults);
  let h = '<div class="grid-2">';

  // Timing table
  h += '<div class="panel"><div class="panel-title">Timing by format</div>';
  h += '<table class="dt"><thead><tr><th></th><th>Opt avg</th><th>Est avg</th><th>Speedup</th></tr></thead><tbody>';
  for (const [fmt, results] of Object.entries(byFmt).sort()) {
    const v = results.filter(r => !r.opt_error);
    if (!v.length) continue;
    const ao = v.reduce((s,r) => s + r.opt_time_ms, 0) / v.length;
    const ae = v.reduce((s,r) => s + r.est_time_ms, 0) / v.length;
    const sp = ae > 0 ? ao / ae : 0;
    h += `<tr><td>${fmt.toUpperCase()}</td><td>${ao.toFixed(0)}ms</td><td>${ae.toFixed(0)}ms</td><td>${sp > 0 ? sp.toFixed(1) + '\u00D7' : '\u2014'}</td></tr>`;
  }
  h += '</tbody></table></div>';

  // Size tier table
  h += '<div class="panel"><div class="panel-title">By size tier</div>';
  h += '<table class="dt"><thead><tr><th></th><th></th><th>Small</th><th>Medium</th><th>Large</th></tr></thead><tbody>';
  for (const [fmt, results] of Object.entries(byFmt).sort()) {
    const v = results.filter(r => !r.opt_error);
    if (!v.length) continue;
    const t = {};
    for (const r of v) {
      const c = r.category || 'medium';
      t[c] = t[c] || { opt: [], est: [] };
      t[c].opt.push(r.opt_time_ms);
      t[c].est.push(r.est_time_ms);
    }
    const avg = (a) => a.length ? (a.reduce((x,y) => x + y, 0) / a.length).toFixed(0) + 'ms' : '\u2014';
    h += `<tr><td>${fmt.toUpperCase()}</td><td style="color:var(--muted);font-family:var(--sans);font-size:12px">opt</td><td>${avg(t.small?.opt||[])}</td><td>${avg(t.medium?.opt||[])}</td><td>${avg(t.large?.opt||[])}</td></tr>`;
    h += `<tr><td></td><td style="color:var(--muted);font-family:var(--sans);font-size:12px">est</td><td>${avg(t.small?.est||[])}</td><td>${avg(t.medium?.est||[])}</td><td>${avg(t.large?.est||[])}</td></tr>`;
  }
  h += '</tbody></table></div>';

  h += '</div>';
  el.innerHTML = h;
}

/* ── HISTORY ───────────────────────────────── */
async function loadHistory() {
  try {
    const r = await fetch('/api/runs');
    const d = await r.json();
    renderHistory(d.runs);
  } catch(e) { console.error('History load failed:', e); }
}

function renderHistory(runs) {
  const el = document.getElementById('history-list');
  if (!runs.length) { el.innerHTML = '<div class="hist-empty">No runs yet.</div>'; return; }
  el.innerHTML = runs.map(run => {
    const date = run.timestamp ? new Date(run.timestamp) : null;
    const ds = date
      ? date.toLocaleDateString(undefined, { month:'short', day:'numeric' }) + ' ' +
        date.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' })
      : '?';
    const health = run.health || {};
    const fmts = run.formats_tested || Object.keys(health);
    const dots = fmts.map(f => `<div class="hist-dot ${health[f]||'warn'}" title="${f}: ${health[f]||'?'}"></div>`).join('');
    return `<div class="hist-item" data-run-id="${run.id}" onclick="loadRun('${run.id}')">
      <div class="hist-date">${ds}</div>
      <div class="hist-meta">${run.git_commit||'?'} \u00B7 ${run.duration_s||'?'}s \u00B7 ${run.result_count||0} cases</div>
      <div class="hist-dots">${dots}</div>
      <div><button class="hist-delete" onclick="event.stopPropagation();deleteRun('${run.id}')">delete</button></div>
    </div>`;
  }).join('');
}

async function loadRun(runId) {
  if (isRunning) return;
  document.querySelectorAll('.hist-item').forEach(el => {
    el.classList.toggle('active', el.dataset.runId === runId);
  });
  try {
    const r = await fetch(`/api/runs/${runId}`);
    const d = await r.json();
    currentResults = d.results || [];
    healthStatus = d.health || {};
    runMeta = {
      git_commit: d.git_commit,
      duration_s: d.duration_s,
      health: d.health,
      total: currentResults.length,
      errors: currentResults.filter(r => r.opt_error).length
    };
    renderAllTabs();
  } catch(e) { console.error('Run load failed:', e); }
}

async function deleteRun(runId) {
  if (!confirm('Delete this run?')) return;
  try {
    await fetch(`/api/runs/${runId}`, { method: 'DELETE' });
    await loadHistory();
  } catch(e) { console.error(e); }
}

init();

// Close config dropdown when clicking outside
document.addEventListener('click', (e) => {
  const d = document.getElementById('config-drop');
  const b = document.getElementById('btn-config');
  if (d.classList.contains('open') && !d.contains(e.target) && e.target !== b) {
    d.classList.remove('open');
  }
});
</script>
