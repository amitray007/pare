name: bench-dashboard

# Files read by the dashboard:
#   - reports/baseline.core.json   (scorecard data — quick-mode or pr-mode run)
#   - git history of the above     (trend charts, via git log --follow)
#
# If reports/scorecard.core.json exists it will take precedence for the scorecard
# (pr-mode run with quality+accuracy data). That file is NOT committed here;
# it will be generated by a follow-up workflow or by promoting a pr-mode run
# from bench-pr.yml. Until then, the scorecard renders gracefully from
# baseline.core.json (quick-mode: speed/reduction only, quality/accuracy = "—").
#
# DO NOT add reports/scorecard.core.json to the path triggers until that file
# is actually generated in CI — adding a missing path trigger is harmless but
# confusing.

on:
  push:
    branches: [main]
    paths:
      - 'reports/baseline.core.json'
      - 'bench/dashboard/**'
      - '.github/workflows/bench-dashboard.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: bench-dashboard
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for git log --follow

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build dashboard
        # --baseline defaults to reports/baseline.core.json (relative to repo root).
        # Pass --baseline reports/scorecard.core.json once that file is generated.
        run: python -m bench.dashboard.build --out-dir dashboard/dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

      - id: deployment
        uses: actions/deploy-pages@v4
