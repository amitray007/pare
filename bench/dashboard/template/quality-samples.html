<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pare — Visual Quality Samples</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset + custom properties (mirrors main page)                       */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #21253a;
      --border: #2a2d3a;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent: #6366f1;
      --danger: #ef4444;
      --warn: #f59e0b;
      --ok: #10b981;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8f9fc;
        --surface: #ffffff;
        --surface2: #f1f3f8;
        --border: #dde1ec;
        --text: #1a1d27;
        --muted: #5c6475;
        --accent: #4f51d4;
        --danger: #dc2626;
        --warn: #d97706;
        --ok: #059669;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      padding: 24px 16px 64px;
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                              */
    /* ------------------------------------------------------------------ */
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ------------------------------------------------------------------ */
    /* Header                                                              */
    /* ------------------------------------------------------------------ */
    header {
      max-width: 1100px;
      margin: 0 auto 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .back-link {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 12px;
    }

    .back-link:hover { text-decoration: underline; }

    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    header h1 span { color: var(--accent); }

    .header-desc {
      font-size: 0.84rem;
      color: var(--muted);
    }

    /* ------------------------------------------------------------------ */
    /* Notice (no-data, lossless)                                          */
    /* ------------------------------------------------------------------ */
    .notice {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 24px;
    }

    .notice code {
      font-family: var(--mono);
      background: var(--surface);
      padding: 1px 5px;
      border-radius: 3px;
    }

    /* ------------------------------------------------------------------ */
    /* Sample cards                                                        */
    /* ------------------------------------------------------------------ */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sample-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }

    .sample-card.status-fail { border-left: 3px solid var(--danger); }
    .sample-card.status-warn { border-left: 3px solid var(--warn); }
    .sample-card.status-ok   { border-left: 3px solid var(--ok); }
    .sample-card.lossless     { border-left: 3px solid var(--ok); opacity: 0.85; }

    /* Card heading row */
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .card-header h2 {
      font-size: 1.05rem;
      font-weight: 700;
      font-family: var(--mono);
    }

    .status-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .status-badge.badge-ok   { background: rgba(16,185,129,0.12); color: var(--ok);    border: 1px solid rgba(16,185,129,0.3); }
    .status-badge.badge-warn { background: rgba(245,158,11,0.12);  color: var(--warn);  border: 1px solid rgba(245,158,11,0.3); }
    .status-badge.badge-fail { background: rgba(239,68,68,0.12);   color: var(--danger);border: 1px solid rgba(239,68,68,0.3); }

    /* Card meta rows */
    .card-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .card-meta code {
      font-family: var(--mono);
      font-size: 0.80rem;
      color: var(--text);
    }

    .card-meta strong {
      color: var(--text);
      font-weight: 600;
    }

    /* Lossless annotation */
    .lossless-note {
      font-size: 0.84rem;
      color: var(--ok);
      margin-top: 6px;
    }

    /* No-data annotation */
    .no-data-note {
      font-size: 0.84rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 6px;
    }

    /* ------------------------------------------------------------------ */
    /* Thumbnail pair                                                       */
    /* ------------------------------------------------------------------ */
    .sample-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 16px;
    }

    @media (max-width: 560px) {
      .sample-pair {
        grid-template-columns: 1fr;
      }
    }

    .sample-pair figure {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .sample-pair img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      border: 1px solid var(--border);
      display: block;
      background: var(--surface2);
    }

    .sample-pair figcaption {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* No-thumbs placeholder (when corpus not available) */
    .no-thumb {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 160px;
      border: 1px dashed var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: 0.80rem;
    }

    /* ------------------------------------------------------------------ */
    /* Section separator                                                   */
    /* ------------------------------------------------------------------ */
    .section-title {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin: 32px 0 16px;
    }
  </style>
</head>
<body>

<div class="wrap">

<header>
  <a class="back-link" href="../">← Back to scorecard</a>
  <h1>Pare <span>— Visual Quality Samples</span></h1>
  <p class="header-desc">
    Worst-quality case per lossy format from the latest pr-mode run.
    Thumbnails are 300×300 max. Lossless formats are pixel-identical to their inputs.
    __META_HTML__
  </p>
</header>

<main>

</main>

</div><!-- .wrap -->
</body>
</html>
